<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>УЗЕ — КП</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="../css/telegram.css" />

  <script src="../js/uze-catalog-data.js"></script>
  <script src="../js/catalog.js" defer></script>
  <script src="../js/uze-calculate-engine.js" defer></script>
  <script src="../js/uze/uze.js" defer></script>
</head>

<body>
<div class="app">

  <!-- ── ФОРМА ── -->
  <div id="uzeForm">

  <div class="page-header">
    <span class="page-icon">🔋</span>
    <h1 class="page-title">УЗЕ · Комерційна пропозиція</h1>
  </div>

  <div class="card form-card">

    <div class="field">
      <label for="project_name">Назва проєкту / компанія</label>
      <input id="project_name" type="text" placeholder="ТОВ Приклад Груп" />
    </div>

    <div class="field">
      <label for="manager">Менеджер</label>
      <select id="manager">
        <option value="">Оберіть менеджера</option>
      </select>
    </div>

    <div class="field">
      <label for="region">Регіон</label>
      <select id="region">
        <option value="">Оберіть регіон</option>
        <option>Вінницька область</option>
        <option>Волинська область</option>
        <option>Дніпропетровська область</option>
        <option>Донецька область</option>
        <option>Житомирська область</option>
        <option>Закарпатська область</option>
        <option>Запорізька область</option>
        <option>Івано-Франківська область</option>
        <option>м. Київ</option>
        <option>Київська область</option>
        <option>Кіровоградська область</option>
        <option>Луганська область</option>
        <option>Львівська область</option>
        <option>Миколаївська область</option>
        <option>Одеська область</option>
        <option>Полтавська область</option>
        <option>Рівненська область</option>
        <option>Сумська область</option>
        <option>Тернопільська область</option>
        <option>Харківська область</option>
        <option>Херсонська область</option>
        <option>Хмельницька область</option>
        <option>Черкаська область</option>
        <option>Чернівецька область</option>
        <option>Чернігівська область</option>
      </select>
    </div>

    <div class="field">
      <label for="uze_model">Модель УЗЕ</label>
      <select id="uze_model">
        <option value="">Завантаження...</option>
      </select>
    </div>

    <div class="field">
      <label for="uze_qty">Кількість УЗЕ</label>
      <div id="qtyWrap">
        <select id="uze_qty" disabled style="width:100%"><option value="">Спочатку оберіть модель</option></select>
      </div>
      <div id="qtyError" style="color:#e53935;font-size:13px;padding:3px 0"></div>
    </div>

    <div class="field">
      <label for="uze_vat">Вартість УЗЕ</label>
      <select id="uze_vat">
        <option value="без ПДВ" selected>без ПДВ</option>
        <option value="з ПДВ">з ПДВ</option>
      </select>
    </div>

    <div class="field">
      <label for="equipment_vat">Обладнання та матеріали</label>
      <select id="equipment_vat">
        <option value="з ПДВ" selected>з ПДВ</option>
        <option value="без ПДВ">без ПДВ</option>
      </select>
    </div>

    <div class="field">
      <label for="currency">Валюта</label>
      <select id="currency">
        <option value="USD">USD ($)</option>
        <option value="EUR">EUR (€)</option>
      </select>
    </div>

    <div class="field">
      <label for="usage_type">Тип використання</label>
      <select id="usage_type">
        <option value="На власне споживання" selected>На власне споживання</option>
        <option value="Арбітраж на підприємстві">Арбітраж на підприємстві</option>
      </select>
    </div>

    <div class="field">
      <label for="delivery_term">Термін доставки</label>
      <select id="delivery_term">
        <option>1 місяць</option>
        <option>2 місяці</option>
        <option>3 місяці</option>
        <option>3–4 місяці</option>
        <option>3,5–4 місяці</option>
        <option>4–4,5 місяця</option>
        <option>4–5 місяців</option>
        <option>5 місяців</option>
        <option>4,5–6 місяців</option>
      </select>
    </div>

    <div class="field">
      <label for="payment_terms">Умови оплати</label>
      <select id="payment_terms">
        <option>100% передплата</option>
        <option>30% аванс, 70% перед відвантаженням з заводу</option>
      </select>
    </div>

  </div>

  <div id="formError" style="color:#e53935;font-size:13px;padding:4px 8px;text-align:center"></div>

  <button class="primary-btn" id="submitBtn">Підготувати КП УЗЕ</button>

  </div><!-- /uzeForm -->

  <!-- ── PREVIEW ── -->
  <div id="uzePreview" style="display:none">

    <div class="page-header">
      <span class="page-icon">📋</span>
      <h1 class="page-title">Перегляд КП</h1>
    </div>

    <!-- Зведення -->
    <div class="card form-card">
      <div class="divider">Зведення</div>
      <div id="pvSummary"></div>
    </div>

    <!-- Ціна УЗЕ -->
    <div class="card form-card" style="margin-top:10px">
      <div class="divider">Ціна УЗЕ</div>
      <div id="pvUzePrice"></div>
    </div>

    <!-- Обладнання та роботи -->
    <div class="card form-card" style="margin-top:10px">
      <div class="divider">Обладнання та роботи</div>
      <div id="pvEquipment"></div>
    </div>

    <!-- Підсумок -->
    <div class="card form-card" style="margin-top:10px">
      <div id="pvTotals"></div>
    </div>

    <div id="pvError" style="color:#e53935;font-size:13px;padding:4px 8px;text-align:center"></div>

    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="primary-btn" id="pvBackBtn" style="background:#f5f5f5;color:#333;border:1px solid #e0e0e0;flex:1">← Назад</button>
      <button class="primary-btn" id="pvSendBtn" style="flex:2">📤 Відправити КП</button>
    </div>

  </div><!-- /uzePreview -->

</div>
</body>
</html>
